# Nixpacks build configuration for Railway
# Builds frontend, copies to backend/public, then installs backend deps

[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.install_frontend]
dependsOn = ["setup"]
cmds = ["cd frontend && npm ci"]

[phases.build_frontend]
dependsOn = ["install_frontend"]
cmds = ["cd frontend && npm run build", "cp -r frontend/dist backend/public"]

[phases.install_backend]
dependsOn = ["build_frontend"]
cmds = ["cd backend && npm ci"]

[start]
cmd = "cd backend && node index.js"
